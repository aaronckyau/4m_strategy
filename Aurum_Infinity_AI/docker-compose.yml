services:
  aurum-web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      DATABASE_PATH: ${DATABASE_PATH:-/runtime/aurum.db}
      AURUM_DATA_FETCHER_DIR: /Aurum_Data_Fetcher
    ports:
      - "127.0.0.1:${APP_PORT:-5000}:5000"
    volumes:
      - ./runtime:/runtime
      - ./logs:/app/logs
      - ../data/db:/data/db
      - ../Aurum_Data_Fetcher:/Aurum_Data_Fetcher
      - ../News_features:/News_features:ro
      - ../News_fetcher/data:/News_fetcher/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
