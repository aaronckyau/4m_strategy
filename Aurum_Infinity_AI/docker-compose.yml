services:
  aurum-web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL:-/runtime/aurum.db}
    ports:
      - "127.0.0.1:${APP_PORT:-5000}:5000"
    volumes:
      - ./runtime:/runtime
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s