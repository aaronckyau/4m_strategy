  call:
    name: 法說會解構
    prompt: '資料來源指引：{data_source}


      ## 分析標的：{stock_name}（交易所：{exchange} ｜ 代碼：{ticker}，僅供參考） ⚠️ 請以「{stock_name}」作為搜尋與分析的主要依據，不要僅依靠股票代碼來識別公司。若代碼查詢結果與公司名稱不符，以公司名稱為準。


      請分析最近一次法說會（Earnings Call）的內容：


      ### 一、Guidance 摘要

      以 Markdown 表格列出管理層對下一季/年的指引：


      | 指標 | 管理層指引 | 市場共識預期 | 差異 |

      |------|-----------|------------|------|


      - 指引是上調、維持還是下調？

      - 與市場預期相比偏保守還是激進？


      ### 二、管理層語氣分析

      - 整體語氣偏樂觀、中性還是謹慎？

      - 哪些業務被特別強調（正面或負面）？

      - 是否有明顯的「話術轉變」（相比前次法說會）？

      - 管理層在 Q&A 環節是否有迴避某些問題？


      ### 三、關鍵主題與訊號

      - 法說會中被提及最多次的關鍵詞或主題是什麼？

      - 是否有任何意外的新資訊或策略轉向？

      - 分析師最關注的問題集中在哪些方面？


      ### 四、隱藏風險訊號

      - 是否有任何「埋雷」式的措辭（如「one-time」、「transitional」、「restructuring」）？

      - 現金流或資本支出指引是否與營收指引矛盾？


      ### 五、綜合判讀

      用 3-5 句話總結這次法說會的核心訊息，以及對投資決策的影響。


      ---


      ### 六、法說會品質評分

      請根據上述五項分析，對以下五個維度分別評分（每項 1-10 分），並給出綜合評分：


      | 法說會品質維度 | 評分(1-10) | 簡要說明 |

      |--------------|-----------|---------|

      | 指引方向性（上調/持平/下調程度） | | 管理層指引相比市場預期是否樂觀、保守或激進 |

      | 語氣可信度（當前語氣 vs 教後行動一致性） | | 管理層在此次法說會的樂觀程度是否與實際執行相符 |

      | 信息原創性（新資訊披露程度） | | 是否有意外的新診斷、策略轉向或未預期的催化劑 |

      | 語氣一致性（本次 vs 前次法說會） | | 管理層態度是否保持穩定，或有明顯轉變（需標註轉變方向） |

      | 下行風險揭示（埋雷訊號強度） | | 隱藏風險與「埋雷」措辭程度（越多埋雷 = 分數越低） |

      | **綜合評分** | | 整體法說會品質與信息透明度 |


      **評分指南：**

      - **1-3 分**：品質低下，多埋雷、語氣矛盾、管理層迴避問題 - **4-6 分**：品質中等，有部分風險訊號，但基本透明 - **7-8 分**：品質良好，語氣樂觀且後續執行有望
      - **9-10 分**：品質優秀，信息透明、目標明確、執行力強

      '
