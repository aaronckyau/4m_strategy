  price_analysis:
    name: 時段走勢分析
    prompt: '以下是 {ticker}（{stock_name}）從 {start_date} 至 {end_date} 的每日 OHLC 價格數據：

      {price_data}


      ## 分析方法論

      你是一位量化與基本面兼備的資深分析師。請以**價格異動為主（40%權重）、新聞事件為輔（60%權重）**的方式分析。

      **核心邏輯**：先從價格數據中識別異常波動（單日漲跌幅 > 3%、成交量 > 20 日均量 1.5 倍、連續多日單邊走勢），再利用網路搜尋找出對應的真實事件解釋。如果某次大波動找不到明確新聞，應標註為「技術面慣性」或「市場情緒傳導」，不要硬湊新聞。


      ### 一、整體走勢概覽（2-3 句話）

      - 區間漲跌幅：開盤首日 Open → 最後收盤 Close，計算百分比

      - 期間最高 / 最低收盤價及日期

      - 趨勢定性（強勢上漲 / 震盪整理 / 持續下跌 / V 型反轉 / 高檔震盪等）


      ### 二、關鍵價格異動分析

      從價格數據中找出 **5-8 個最顯著的波動點或轉折區間**，按時間順序逐一分析。

      每個異動點請用以下格式輸出（不要用巢狀編號，用表格 + 段落）：

      ---

      #### ① 2025-09-05：單日暴跌 18.59%

      | 指標 | 數值 | |------|------| | 漲跌幅 | -18.59% | | 成交量 | 36.78M（前5日均量的 8.5 倍） |
      | 形態 | 跳空低開長黑K，恐慌性拋售 |

      **事件歸因：** 公司發布財報後，市場對營收指引不滿，尤其是北美市場成長放緩（來源：Reuters）。若無明確新聞，則標註「技術面慣性」或「板塊聯動」。

      **深層解讀：** 這是典型的利空出盡前的高強度「重新定價」，市場對其過往的高成長估值模型進行了劇烈修正。是否有提前反應或過度反應跡象也請說明。

      **量價判斷：** 極度放量下跌，確認短期趨勢轉折，屬於見頂後的拋售訊號。

      ---

      （依此格式，每個事件用 `---` 分隔線隔開，標題用 #### 加上編號圓圈 ①②③④⑤⑥⑦⑧）


      ### 三、事件標記（必須輸出）

      在報告最末尾，請額外輸出一段 HTML 註解，包含你在第二節提到的所有關鍵異動點，格式如下：

      ``` <!-- EVENTS_JSON [ {"date": "2025-10-28", "title": "投行集體上調目標價，量能放大2.1倍",
      "type": "up"}, {"date": "2025-11-21", "title": "AI投資ROI疑慮引發機構拋售", "type": "down"}
      ] --> ```

      規則： - date 必須是 YYYY-MM-DD 格式，且必須在價格數據範圍內 - title 最多 18 個中文字（或 36 英文字元），簡潔描述事件
      - type 只能是 "up"（利多/上漲）或 "down"（利空/下跌） - 至少 5 個，最多 8 個事件 - 這段 HTML 註解不會顯示在報告中，僅供系統解析使用

      '
