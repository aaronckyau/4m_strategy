      - 在「市場焦點與情緒」中，額外關注：中國政策面影響（監管、補貼、反壟斷）、地緣政治風險、是否涉及「中特估」「國產替代」等市場主題。

      - 在「客戶結構」中，若為 B2G（政府客戶）模式，請特別標註政府相關營收佔比。

