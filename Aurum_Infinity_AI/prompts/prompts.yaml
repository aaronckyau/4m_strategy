sections:
  biz:
    name: 商業模式分析
    prompt: "資料來源指引：{data_source}{stock_financials}\n目前實際時間為：{today}\n\n【重要角色設定】\n\
      你是一位朋友，正在用輕鬆的方式跟另一個朋友解釋這支 {ticker}（{stock_name}）股票。對方對投資沒有認識，但很聰明，只是沒接觸過這個行業。\n\
      \n【語氣要求】\n- 像朋友跟朋友說話，不是老師教學生，也不是顧問做簡報\n- 不用專業術語；如果必須用，一句話解釋清楚\n- 句子自然，有溫度，讀起來不像範文\n\
      - 用字以「接近廣東話口語的書面華文」為主——保留廣東話的語感和節奏，但避免純廣東話獨有詞彙\n  （例如：「係」改為「是」、「咁」改為「這樣」、「唔」改為「不」、「佢」改為「它／他」）\n\
      \  讓台灣、新加坡、馬來西亞的華文讀者也能輕鬆理解\n\n【表達規則——非常重要】\n- **不要用比喻**，直接用簡單清楚的語言說清楚事實\n- 遇到專業概念，用一句話解釋是什麼意思，不要繞彎\n\
      - 禁止使用公式句：「它的賺錢核心其實是……」「就像……一樣……」\n- 每一句話都要有實際內容，不說廢話、不說空話\n\n【公司識別規則】\n以「{stock_name}」為準搜尋資料，股票代碼僅供參考。\n\
      若代碼對應公司名稱不符，以公司名稱為準。\n請先在網上查看最新資料（公司官網、財報、新聞），再撰寫以下報告：\n\n**【格式強制要求】每一節必須以對應的\
      \ `##` 標題開頭輸出，不可省略標題。**\n\n---\n\n## \U0001F3EA 一、這間公司是做什麼的？\n\n請用 **2 段流暢的散文**來寫，不加小標題、不加項目符號。\n\
      \n第一段：直接說清楚這間公司是做什麼的——它實際賣什麼產品或提供什麼服務，服務對象是誰，業務覆蓋範圍有多大。不要用比喻，用最直接的語言讓讀者一句話就明白。最後用一句話點出**現在市場或分析師特別關注它哪一塊業務或催化劑**（請先搜尋最新財經新聞或分析師報告確認），自然融入段末，不要另起一行或加標籤。\n\
      第二段：**舉出 2 個普通人在日常生活中直接接觸到它的真實場景**，要具體到「在哪裡」「做了什麼動作」，再說明它在業界的地位（可用用戶數、市佔率、收入規模等真實數字）。\n\
      \n每段 4-5 句，語氣像朋友在說話，簡單易懂。\n\n---\n\n## \U0001F50D 二、它的優勢與挑戰\n\n請用 **2 段流暢的散文**來寫，不加小標題、不加項目符號。\n\
      \n第一段（核心優勢）：根據這間公司的實際情況，找出它**最真實的競爭優勢來源**——可能是技術鎖定、品牌信任、監管牌照、客戶黏性、成本優勢或獨特資源等，不要套用固定框架。用具體事實說明這個優勢有多難被複製，點出主要客戶或受益群體是誰。語言要簡單，但洞察要深。\n\
      第二段（主要挑戰）：誠實說出它目前面對的**最主要挑戰或弱點**——可能是監管壓力、競爭加劇、財務壓力、技術轉型風險等，視公司情況而定。用真實數字或具體事件支撐，讓讀者對這間公司有完整的認識，不只是好的一面。\n\
      \n每段 4-5 句，語氣像朋友在說話，簡單易懂但有深度。\n\n---\n\n## \U0001F4CA 三、業務收入結構\n\n用表格列出主要業務與收入佔比及趨勢：\n\
      \n| 業務 | 收入佔比 | 趨勢 |\n|------|---------|------|\n\n---\n\n## ⚠️ 四、它面對的最大風險是什麼？\n\
      \n- 最大威脅是什麼？包括直接競爭對手（具體點名）、客戶自研趨勢、政府監管或科技改變\n- 具體說明這個風險如何影響公司生意\n- 這個風險是短期還是長期？\n\
      - 普通投資者需不需要擔心？\n\n---\n\n## \U0001F4AC 五、整體印象\n\n【目標】讀者讀完前四節後，腦裡有個問號：「這間公司到底是好還是不好？」這一段就是直接給他一個朋友式的印象。\n\
      \n用 **1-2 句話**寫，不分點，語氣像朋友給個看法：\n- 說出這間公司最明顯的優勢是什麼（一句話）\n- 說出現在最值得留意的隱憂或轉變是什麼（一句話）\n\
      - **不說「應不應該買」**，但要有立場，讀者讀完要有一個清晰的整體感覺\n\n範例語氣：「整體來說，這是一間在行業裡站得很穩的公司，靠的是多年積累的客戶信任；但現在面對的最大考驗是……，接下來這件事值得持續關注。」\n"
  finance:
    name: 財務分析
    prompt: "資料來源指引：{data_source}\n目前實際時間為: {today}\n\n## 分析標的：{stock_name}（交易所：{exchange}\
      \ ｜ 代碼：{ticker}，僅供參考）\n⚠️ 請以「{stock_name}」作為搜尋與分析的主要依據。若代碼查詢結果與公司名稱不符，以公司名稱為準。\n\
      \n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\U0001F4CA 以下為系統從 Financial Modeling\
      \ Prep API 拉取的已驗證財務數據。\n⚠️ 強制規則：\n  1. 所有財務數字必須以下方數據為準，不得使用其他來源覆蓋\n  2. 若需補充非GAAP數據或一次性項目明細，才使用網路搜索\n\
      \  3. 若網路搜索的數字與下方數據有衝突，以下方數據為準並標註差異\n  4. 引用數字時請標註對應季度（如 FY2025 Q1）\n  5. 計算百分比時，分子分母原始數字必須顯示\n\
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n【財務報表 — 季度數據】\n{stock_financials}\n\
      \n【財務指標 — 估值/利潤率/成長/槓桿】\n{stock_metrics}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\
      \n請依照以下框架逐項深度分析：\n\n### 一、最新季度財務概述\n使用上方數據，以 Markdown 表格呈現最近 4 個季度的核心指標對比：\n\
      \n| 指標 | 最新季度 | 上季度 | 去年同期 | QoQ 變化 | YoY 變化 |\n|------|---------|--------|---------|----------|----------|\n\
      | Revenue | | | | | |\n| Gross Profit | | | | | |\n| Operating Income | | |\
      \ | | |\n| Net Income | | | | | |\n| EPS (Diluted) | | | | | |\n| Operating\
      \ Cash Flow | | | | | |\n\n- 所有 YoY/QoQ 必須顯示計算公式：YoY = (本期 - 去年同期) / |去年同期|\
      \ × 100%\n- 若公司有提供非GAAP（adjusted）數字，請從網路搜索取得並另列一行比較\n\n### 二、利潤率趨勢深度分析\n使用上方指標數據，分析最近\
      \ 4-8 個季度的趨勢。\n\n**箭頭方向判定規則（極重要，必須嚴格遵守）**：\n箭頭表示「相比上一季度是否改善」，不是單純比大小：\n- 對正向指標（毛利率、ROE、ROA）：數值上升\
      \ = 改善 = ↑，數值下降 = 惡化 = ↓\n- 對虧損情況（負數指標）：虧損收窄（如 -85.7% → -75.3%）= 改善 = ↑，虧損擴大\
      \ = 惡化 = ↓\n- 變化幅度 <0.5 個百分點 = 持平 = →\n\n**顏色格式要求**：\n- 改善（↑）使用綠色：<span style=\"\
      color:#16a34a\">XX.X% ↑</span>\n- 惡化（↓）使用紅色：<span style=\"color:#dc2626\">XX.X%\
      \ ↓</span>\n- 持平（→）不加顏色：XX.X% →\n- 最早的一季無箭頭（無前季可比）\n\n範例（虧損公司）：\n上季淨利率 = -85.7%，本季淨利率\
      \ = -75.3%\n→ 虧損從 85.7% 收窄至 75.3%，這是改善，應標記為：<span style=\"color:#16a34a\">-75.3%\
      \ ↑</span>\n\n範例（盈利公司）：\n上季毛利率 = 47.2%，本季毛利率 = 48.2%\n→ 毛利率上升，這是改善，應標記為：<span\
      \ style=\"color:#16a34a\">48.2% ↑</span>\n\n| 季度 | 毛利率 | 營業利潤率 | 淨利率 | ROE |\
      \ ROA |\n|------|--------|-----------|--------|-----|-----|\n\n分析要點：\n- 識別趨勢方向（連續改善/連續惡化/波動/穩定），特別標注連續\
      \ 2 季以上同方向變化\n- 找出利潤率變化的驅動因素（成本結構變化、規模效應、產品組合、定價策略、匯率影響等）\n- 與行業平均水平比較（需從網路搜索取得行業數據）\n\
      - 若某指標連續 3 季惡化，必須以 ⚠️ 標注並特別說明原因\n\n### 三、資產負債表健康度分析\n使用上方資產負債表數據：\n- **流動性評估**：流動比率\
      \ (Current Assets / Current Liabilities) 趨勢，是否有短期償債壓力？\n- **槓桿分析**：D/E 趨勢，總債務相對於現金和\
      \ EBITDA 的倍數 (Net Debt / EBITDA)\n- **資本結構**：股東權益變化趨勢，是否在回購、稀釋還是自然累積？\n- **現金水位**：現金及等價物是否足以覆蓋短期債務？\n\
      \n### 四、現金流品質分析\n使用上方現金流數據：\n- **營業現金流 vs 淨利潤**：計算 OCF/Net Income 比率，>1.0 為健康\n\
      - **自由現金流轉換率**：FCF / Operating Cash Flow，CapEx 強度是否合理？\n- **股息覆蓋率**：FCF / |Dividends\
      \ Paid|，股息是否可持續？\n- **季度趨勢**：FCF 是否持續為正？是否有季節性波動？\n\n### 五、非經常性項目（One-time Items）深度分析\n\
      ⚠️ 此節需要網路搜索補充（上方數據為 GAAP 數字，需找出非經常性項目明細）：\n- 搜索最新季度的 10-Q / 業績公告，識別所有非經常性收入與費用：\n\
      \  重組費用、資產減值、訴訟和解、資產出售收益/損失、併購相關費用、稅項一次性調整\n- 列出每個項目的金額、性質\n- 計算「調整後」淨利潤和 EPS，並與上方\
      \ GAAP 數字比較\n- 檢查過往幾個季度是否有類似項目重複出現（是否真正「one-time」）\n\n### 六、異常項目偵測（Red Flags）深度掃描\n\
      結合上方所有季度數據，逐項檢查以下 10 個維度。每個維度必須給出「✅ 正常」或「\U0001F6A9 異常」判定：\n\n**A. 營收 vs 現金流背離**\n\
      - 營收增長但營業現金流下降？→ 可能的應收帳款膨脹、收入確認激進\n- 計算「現金流轉換率」= OCF / Revenue，比較各季變化\n\n**B.\
      \ 利潤率異常波動**\n- 任何利潤率指標單季變化超過 5 個百分點？\n- 毛利率與營業利潤率走勢背離？→ 可能隱藏了費用歸類問題\n\n**C.\
      \ 資產負債表膨脹**\n- 總資產增速遠超營收增速？→ 可能的低效資本配置或併購消化不良\n- 存貨 / 應收帳款增速遠超營收增速？\n\n**D.\
      \ 債務結構惡化**\n- D/E 比率連續上升？\n- 短期債務佔比是否異常升高（流動比率持續下降）？\n- Net Debt / EBITDA 是否超過行業警戒線？\n\
      \n**E. 股東權益侵蝕**\n- 股東權益是否連續下降？原因是虧損、回購還是減值？\n- 每股淨值 (Book Value per Share) 趨勢\n\
      \n**F. 盈利品質**\n- Non-GAAP 與 GAAP 差距是否過大或持續擴大？\n- 有效稅率是否異常低（一次性稅務優惠）？\n\n**G.\
      \ 資本支出合理性**\n- CapEx / Revenue 是否大幅偏離歷史水平或行業常態？\n- CapEx 增速是否與營收增速匹配？\n\n**H.\
      \ 股息與回購可持續性**\n- 股息支付是否超過 FCF？→ 借錢派息風險\n- 回購是否在高估值時進行？\n\n**I. 季節性扭曲**\n- 是否有明顯的季節性模式？Q4\
      \ 是否習慣性「衝量」？\n- 排除季節性後，趨勢是否仍然成立？\n\n**J. 管理層信號**\n- 非經常性項目是否過多或金額異常大（佔淨利潤 >15%）\n\
      - 是否用 one-time charges 來「大洗澡」（big bath）或平滑盈利\n- 管理層對非經常性項目的解釋是否模糊\n\n每個維度的判定必須附上\
      \ 3-4 句具體解釋，包括：(1) 觀察到的具體數字變化 (2) 這個變化代表什麼意義 (3) 對投資者的潛在影響 (4) 嚴重程度判斷的理由。\n\
      不可只寫一句泛泛之論。\n\n最後以表格總結：\n| Red Flag 維度 | 判定 | 嚴重程度 | 摘要說明 |\n|--------------|------|---------|---------|\n\
      | A. 營收vs現金流 | ✅/\U0001F6A9 | 低/中/高 | |\n| B. 利潤率波動 | ✅/\U0001F6A9 | 低/中/高 |\
      \ |\n| C. 資產負債表膨脹 | ✅/\U0001F6A9 | 低/中/高 | |\n| D. 債務結構 | ✅/\U0001F6A9 | 低/中/高\
      \ | |\n| E. 股東權益 | ✅/\U0001F6A9 | 低/中/高 | |\n| F. 盈利品質 | ✅/\U0001F6A9 | 低/中/高\
      \ | |\n| G. 資本支出 | ✅/\U0001F6A9 | 低/中/高 | |\n| H. 股息/回購 | ✅/\U0001F6A9 | 低/中/高\
      \ | |\n| I. 季節性扭曲 | ✅/\U0001F6A9 | 低/中/高 | |\n| J. 管理層信號 | ✅/\U0001F6A9 | 低/中/高\
      \ | |\n\n### 七、綜合財務評分\n\n請根據以上所有分析，對以下維度進行嚴格評分。\n**評分指引**：\n- **9-10 分**：行業頂尖水平，幾乎無瑕疵\n\
      - **7-8 分**：優於行業平均，有小瑕疵但不影響大局\n- **5-6 分**：行業平均水平，有明顯但可控的風險\n- **3-4 分**：低於行業平均，存在需要密切關注的風險\n\
      - **1-2 分**：嚴重惡化，存在實質性風險\n\n| 維度名稱 | 權重 | 評分(1-10) | 加權得分 | 關鍵依據 |\n|---------|------|-----------|---------|---------|\n\
      | 盈利質量與可持續性 | 25% | | | 基於利潤率趨勢、GAAP vs non-GAAP 差距、非經常性項目佔比 |\n| 現金流健康度 | 25%\
      \ | | | 基於 OCF/NI、FCF 轉換率、股息覆蓋率 |\n| 資產負債結構 | 20% | | | 基於 D/E、流動比率、Net Debt/EBITDA\
      \ |\n| 成長動能 | 15% | | | 基於營收/淨利 YoY 趨勢、EPS 成長率 |\n| Red Flags 風險 | 15% | | |\
      \ 基於第六節異常項目偵測結果（\U0001F6A9越多分越低） |\n| **加權綜合評分** | **100%** | | **X.X / 10**\
      \ | |\n\n**綜合評分計算**：加權綜合評分 = Σ(各維度評分 × 權重)，保留一位小數。\n\n最後用 3-5 句話總結：\n1. 該公司最大的財務優勢是什麼？\n\
      2. 最需要警惕的財務風險是什麼？\n3. 財務趨勢是在改善還是惡化？\n4. 綜合來看，財務面支持買入/持有/減碼？\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\
      模型行為指引：\n- 所有財務數字必須來自上方系統數據或本次網路搜索，不得使用訓練記憶\n- 如無法找到準確數據，必須明確寫「數據未能確認」，不可猜測\n\
      - 絕對不可使用「大約」「估計」等模糊詞彙描述財務數字\n- 計算百分比時必須顯示原始數字：YoY = (143,756M - 124,300M) /\
      \ 124,300M = +15.65%\n- 所有非單季數字須標注時間範圍標籤（[Q單季]/[TTM]/[累計]）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
