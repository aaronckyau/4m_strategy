repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-aurum-infinity-ai
        name: pytest-aurum-infinity-ai
        entry: powershell -NoProfile -ExecutionPolicy Bypass -Command "$env:PYTHONPATH=(Resolve-Path 'Aurum_Infinity_AI').Path; python -m pytest Aurum_Infinity_AI/tests -q"
        language: system
        pass_filenames: false
        stages: [pre-push]
